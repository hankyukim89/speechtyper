name: Build installers

# Builds SpeechTyperSetup.exe (Windows) and SpeechTyper.dmg (macOS).
# Run manually from the Actions tab, or push a tag like v2.0.0 to also
# attach both installers to a GitHub Release.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
      - name: Build app
        run: pyinstaller --noconfirm --clean packaging/speechtyper.spec
      - name: Build installer (Inno Setup)
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" packaging\windows-installer.iss
        shell: pwsh
      - uses: actions/upload-artifact@v4
        with:
          name: SpeechTyperSetup-windows
          path: packaging/Output/SpeechTyperSetup.exe

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r requirements.txt
          brew install create-dmg
      - name: Build app + DMG
        env:
          # Set these repo secrets to code-sign + notarize (Apple Developer ID):
          SIGN_ID: ${{ secrets.SIGN_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          APP_SPECIFIC_PW: ${{ secrets.APP_SPECIFIC_PW }}
        run: ./packaging/build_macos.sh
      - uses: actions/upload-artifact@v4
        with:
          name: SpeechTyper-macos
          path: dist/SpeechTyper.dmg

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            SpeechTyperSetup.exe
            SpeechTyper.dmg
          generate_release_notes: true
